name: Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=code_review_env \
            --cov=tasks \
            --cov=graders \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Verify gymnasium compliance
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from code_review_env.env import CodeReviewEnv
          from gymnasium.utils.env_checker import check_env
          for diff in ('easy', 'medium', 'hard'):
              e = CodeReviewEnv(difficulty=diff, seed=0)
              check_env(e, skip_render_check=False)
              print(f'check_env({diff}) PASSED')
              e.close()
          "

      - name: Run heuristic baseline smoke test
        run: |
          python baseline/run_agent.py --no-llm --episodes 3 --seed 42
